# End-user documentation site, built with Zensical (https://zensical.org).
#   preview:  cd website && zensical serve      # http://localhost:8000
#   build:    cd website && zensical build       # -> website/site/
# Dev-facing docs stay in the repo-root docs/ (architecture, goals); this site
# is for people installing and self-hosting the app.

[project]
site_name = "Gullak"
site_description = "A local-first, private expense tracker. Your money stays on your phone; sync and AI are optional and self-hosted."
site_author = "Karan Sharma"
# site_url = "https://docs.gullak.app/"   # set once the domain is live
copyright = "Copyright &copy; 2026 Karan Sharma — app MIT, server AGPL-3.0"

nav = [
  { "Home" = "index.md" },
  { "Install" = "install.md" },
  { "SMS capture" = "sms-capture.md" },
  { "Self-hosting" = "self-hosting.md" },
]

[project.theme]
# Matches the app's editorial identity.
[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.features]
# (feature list kept minimal; add from the Zensical defaults as needed)

# Sensible authoring extensions (subset of the Zensical default template).
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
