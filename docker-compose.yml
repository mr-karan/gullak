# Gullak v2 + Paisa
# Shared volume allows both services to access the ledger files
# Files are created with host user permissions for easy editing

services:
  gullak:
    build:
      context: .
      args:
        # Match host user for proper file permissions
        GULLAK_UID: ${GULLAK_UID:-1000}
        GULLAK_GID: ${GULLAK_GID:-1000}
    container_name: gullak
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${PAISA_DATA_DIR:-./data}:/data
    environment:
      - TZ=${TZ:-Asia/Kolkata}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GULLAK_DATA_DIR=/data
      - GULLAK_LEDGER_FILE=main.ledger
      - GULLAK_DEFAULT_CURRENCY=${GULLAK_DEFAULT_CURRENCY:-INR}
      - GULLAK_TIMEZONE=${TZ:-Asia/Kolkata}
      - GULLAK_DEBUG=${GULLAK_DEBUG:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      paisa:
        condition: service_healthy

  paisa:
    image: ananthakumaran/paisa:latest
    container_name: paisa
    restart: unless-stopped
    ports:
      - "7500:7500"
    volumes:
      - ${PAISA_DATA_DIR:-./data}:/root/Documents/paisa
    environment:
      - TZ=${TZ:-Asia/Kolkata}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7500"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
