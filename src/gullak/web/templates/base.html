<!DOCTYPE html>
<html lang="en" data-theme="gullak">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Gullak{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <!-- Tailwind CSS v4 + DaisyUI v5 -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Fraunces', 'Georgia', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        border: "var(--border)",
                        input: "var(--input)",
                        ring: "var(--ring)",
                        background: "var(--background)",
                        foreground: "var(--foreground)",
                    }
                }
            },
            daisyui: {
                themes: [
                    {
                        gullak: {
                            "primary": "#4F46E5", // Indigo 600
                            "primary-content": "#ffffff",
                            "secondary": "#E0E7FF", // Indigo 100
                            "secondary-content": "#3730a3", // Indigo 900
                            "accent": "#F59E0B", // Amber 500
                            "accent-content": "#ffffff",
                            "neutral": "#1F2937", // Gray 800
                            "neutral-content": "#ffffff",
                            "base-100": "#FFFFFF",
                            "base-200": "#F9FAFB", // Gray 50
                            "base-300": "#F3F4F6", // Gray 100
                            "base-content": "#111827", // Gray 900
                            "info": "#3B82F6",
                            "success": "#10B981",
                            "warning": "#FBBF24",
                            "error": "#EF4444",
                            
                            "--rounded-box": "0.75rem",
                            "--rounded-btn": "0.5rem",
                            "--rounded-badge": "9999px",
                            "--animation-btn": "0.2s",
                            "--animation-input": "0.2s",
                            "--btn-focus-scale": "0.98",
                            "--border-btn": "1px",
                            "--tab-border": "1px",
                            "--tab-radius": "0.5rem",
                        },
                        "gullak-dark": {
                            "primary": "#6366F1", // Indigo 500
                            "primary-content": "#ffffff",
                            "secondary": "#312E81", // Indigo 900
                            "secondary-content": "#E0E7FF", // Indigo 100
                            "accent": "#FBBF24", // Amber 400
                            "accent-content": "#1F2937",
                            "neutral": "#9CA3AF", // Gray 400
                            "neutral-content": "#1F2937",
                            "base-100": "#09090b", // Zinc 950
                            "base-200": "#18181b", // Zinc 900
                            "base-300": "#27272a", // Zinc 800
                            "base-content": "#FAFAFA", // Zinc 50
                            "info": "#60A5FA",
                            "success": "#34D399",
                            "warning": "#FCD34D",
                            "error": "#F87171",

                            "--rounded-box": "0.75rem",
                            "--rounded-btn": "0.5rem",
                            "--rounded-badge": "9999px",
                            "--animation-btn": "0.2s",
                            "--animation-input": "0.2s",
                            "--btn-focus-scale": "0.98",
                            "--border-btn": "1px",
                            "--tab-border": "1px",
                            "--tab-radius": "0.5rem",
                        }
                    }
                ]
            }
        }
    </script>

    <link href="/static/css/main.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-base-100 text-base-content antialiased selection:bg-primary/20 selection:text-primary overflow-hidden">
    {% block content %}{% endblock %}

    <!-- App JavaScript -->
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
