<!DOCTYPE html>
<html lang="en" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Gullak{% endblock %}</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4338CA" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0C0C0F" media="(prefers-color-scheme: dark)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gullak">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon-180.png">

    <!-- Fonts - Distinctive choices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="/static/js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.3/dist/cdn.min.js"></script>

    <!-- Tailwind CSS + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // Apply saved theme immediately to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const normalizedTheme = savedTheme === 'gullak-dark'
                ? 'dark'
                : savedTheme === 'gullak'
                    ? 'light'
                    : (savedTheme || 'light');
            document.documentElement.setAttribute('data-theme', normalizedTheme);
            if (document.body) {
                document.body.setAttribute('data-theme', normalizedTheme);
            }
        })();

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'system-ui', 'sans-serif'],
                        display: ['Instrument Serif', 'Georgia', 'serif'],
                        mono: ['IBM Plex Mono', 'monospace'],
                    },
                    colors: {
                        border: "var(--border)",
                        input: "var(--input)",
                        ring: "var(--ring)",
                        background: "var(--background)",
                        foreground: "var(--foreground)",
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
                    }
                }
            },
            daisyui: {
                themes: [
                    {
                        gullak: {
                            "primary": "#4338CA",
                            "primary-content": "#ffffff",
                            "secondary": "#E0E7FF",
                            "secondary-content": "#3730A3",
                            "accent": "#F59E0B",
                            "accent-content": "#ffffff",
                            "neutral": "#1F2937",
                            "neutral-content": "#ffffff",
                            "base-100": "#FFFFFF",
                            "base-200": "#F8FAFC",
                            "base-300": "#F1F5F9",
                            "base-content": "#0F172A",
                            "info": "#3B82F6",
                            "success": "#059669",
                            "warning": "#D97706",
                            "error": "#DC2626",

                            "--rounded-box": "1rem",
                            "--rounded-btn": "0.625rem",
                            "--rounded-badge": "9999px",
                            "--animation-btn": "0.2s",
                            "--animation-input": "0.2s",
                            "--btn-focus-scale": "0.98",
                            "--border-btn": "1px",
                            "--tab-border": "1px",
                            "--tab-radius": "0.625rem",
                        },
                        "gullak-dark": {
                            "primary": "#818CF8",
                            "primary-content": "#0F0F23",
                            "secondary": "#312E81",
                            "secondary-content": "#E0E7FF",
                            "accent": "#FBBF24",
                            "accent-content": "#1F2937",
                            "neutral": "#9CA3AF",
                            "neutral-content": "#1F2937",
                            "base-100": "#0C0C0F",
                            "base-200": "#141419",
                            "base-300": "#1E1E26",
                            "base-content": "#F1F5F9",
                            "info": "#60A5FA",
                            "success": "#34D399",
                            "warning": "#FBBF24",
                            "error": "#F87171",

                            "--rounded-box": "1rem",
                            "--rounded-btn": "0.625rem",
                            "--rounded-badge": "9999px",
                            "--animation-btn": "0.2s",
                            "--animation-input": "0.2s",
                            "--btn-focus-scale": "0.98",
                            "--border-btn": "1px",
                            "--tab-border": "1px",
                            "--tab-radius": "0.625rem",
                        }
                    }
                ]
            }
        }
    </script>

    <link href="/static/css/main.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-base-100 text-base-content antialiased selection:bg-primary/20 selection:text-primary overflow-hidden">
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
