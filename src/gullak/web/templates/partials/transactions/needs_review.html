<div class="card-elevated p-4 md:p-5">
    <div class="flex items-center justify-between mb-3">
        <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50">Needs Review</div>
        <div class="text-[10px] font-semibold text-warning bg-warning/10 px-2 py-0.5 rounded-full"
             x-show="$store.transactions.stats.needs_review?.length"
             x-text="$store.transactions.stats.needs_review?.length"></div>
    </div>
    <div class="space-y-3" x-show="$store.transactions.stats.needs_review?.length">
        <template x-for="review in ($store.transactions.stats.needs_review || [])" :key="review.payee">
            <div class="border border-base-200/60 rounded-lg p-3 space-y-2">
                <div class="flex items-center justify-between">
                    <div class="min-w-0">
                        <div class="text-sm font-medium truncate" x-text="review.payee"></div>
                        <div class="text-[10px] text-base-content/40"
                             x-text="`${review.count} txns`"></div>
                    </div>
                    <div class="text-xs font-mono text-base-content/50"
                         x-text="formatCurrency(review.amount, $store.transactions.stats.currency)"></div>
                </div>
                <div class="flex flex-wrap gap-2">
                    <template x-for="reason in (review.reasons || [])" :key="reason">
                        <span class="text-[10px] px-2 py-0.5 rounded-full bg-base-200/70 text-base-content/60"
                              x-text="reason.replace('_', ' ')"></span>
                    </template>
                    <button class="text-[10px] text-primary hover:text-primary/80"
                            x-show="review.suggested_account"
                            @click="$store.transactions.mappingInputs[review.payee] = review.suggested_account">
                        Use suggested
                    </button>
                </div>
                <div class="flex items-center gap-2">
                    <input type="text"
                           x-model="$store.transactions.mappingInputs[review.payee]"
                           class="input-box flex-1 h-8 text-xs"
                           placeholder="Expenses:Food:Delivery" />
                    <button class="px-3 py-1.5 rounded-lg text-[10px] font-semibold bg-primary text-white hover:bg-primary/90 transition-colors"
                            :disabled="$store.transactions.mappingSaving[review.payee]"
                            @click="$store.transactions.learnPayeeMapping(review.payee)">
                        Remember
                    </button>
                </div>
            </div>
        </template>
    </div>
    <div x-show="!$store.transactions.stats.needs_review?.length" class="text-sm text-base-content/40">All clear</div>
</div>
