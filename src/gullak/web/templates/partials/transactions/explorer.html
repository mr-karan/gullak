<div class="card-elevated p-4 md:p-5">
    <div class="flex items-center justify-between">
        <div>
            <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50">Total Spent</div>
            <div class="text-xl md:text-2xl font-semibold text-base-content"
                 x-text="formatCurrency($store.transactions.activeStats.total_spent || 0, $store.transactions.activeStats.currency || 'INR')"></div>
        </div>
        <div class="text-xs font-mono"
             :class="$store.transactions.deltaClass($store.transactions.activeStats.comparison)"
             x-text="$store.transactions.deltaLabel($store.transactions.activeStats.comparison)"></div>
    </div>
    <div class="mt-3">
        <svg viewBox="0 0 120 40" class="w-full h-12">
            <polyline fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      class="text-primary"
                      :points="$store.transactions.sparklinePoints($store.transactions.activeStats.daily_spending, 120, 40)"></polyline>
        </svg>
    </div>
    <div class="mt-2 flex items-center justify-between text-[10px] text-base-content/40 font-mono">
        <span x-text="$store.transactions.activeStats.period_start"></span>
        <span x-text="$store.transactions.activeStats.period_end"></span>
    </div>
    <div class="mt-4 grid grid-cols-2 gap-3">
        <div class="rounded-lg bg-base-200/50 px-3 py-2">
            <div class="text-[10px] uppercase tracking-wider text-base-content/50">Transactions</div>
            <div class="text-sm font-medium text-base-content" x-text="$store.transactions.activeStats.transaction_count || 0"></div>
        </div>
        <div class="rounded-lg bg-base-200/50 px-3 py-2">
            <div class="text-[10px] uppercase tracking-wider text-base-content/50">Avg / txn</div>
            <div class="text-sm font-medium text-base-content"
                 x-text="formatCurrency(($store.transactions.activeStats.total_spent || 0) / Math.max($store.transactions.activeStats.transaction_count || 1, 1), $store.transactions.activeStats.currency || 'INR')"></div>
        </div>
    </div>
</div>

<div class="card-elevated p-4 md:p-5">
    <div class="flex items-center justify-between mb-2">
        <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50">Spend Flow</div>
        <button class="text-[10px] text-base-content/40 hover:text-base-content"
                x-show="hasFilters"
                @click="clearAllFilters()">Clear</button>
    </div>
    <div class="text-[11px] text-base-content/40 mb-4" x-text="breadcrumb"></div>

    <div class="space-y-2">
        <template x-for="cat in flowCategories" :key="cat.name">
            <button class="w-full px-2 py-1.5 rounded-lg border border-transparent transition-colors"
                    :class="isActiveCategory(cat.name) ? 'bg-primary/10 text-primary' : 'hover:bg-base-200/60 text-base-content'"
                    @click="selectCategory(cat.name)">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium truncate" x-text="cat.name"></span>
                    <span class="text-xs font-mono text-base-content/50"
                          x-text="formatCurrency(cat.amount, $store.transactions.activeStats.currency)"></span>
                </div>
                <div class="mt-1 h-1.5 bg-base-200/70 rounded-full overflow-hidden">
                    <div class="h-full bg-primary"
                         :style="`width:${cat.percent.toFixed(1)}%`"></div>
                </div>
            </button>
        </template>
        <div x-show="!flowCategories.length" class="text-sm text-base-content/40">No data available</div>
    </div>

    <div class="mt-4" x-show="$store.transactions.categoryFilter" x-cloak>
        <div class="flex items-center justify-between mb-2">
            <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50">Subcategories</div>
            <button class="text-[10px] text-base-content/40 hover:text-base-content"
                    x-show="$store.transactions.subCategoryFilter"
                    @click="$store.transactions.setSubCategory('')">Clear</button>
        </div>
        <div class="space-y-2">
            <template x-for="sub in flowSubcategories" :key="sub.name">
                <button class="w-full px-2 py-1.5 rounded-lg border border-transparent transition-colors"
                        :class="isActiveSubcategory(sub.name) ? 'bg-primary/10 text-primary' : 'hover:bg-base-200/60 text-base-content'"
                        @click="selectSubcategory(sub.name)">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium truncate" x-text="sub.name"></span>
                        <span class="text-xs font-mono text-base-content/50"
                              x-text="formatCurrency(sub.amount, $store.transactions.activeStats.currency)"></span>
                    </div>
                    <div class="mt-1 h-1.5 bg-base-200/70 rounded-full overflow-hidden">
                        <div class="h-full bg-primary"
                             :style="`width:${sub.percent.toFixed(1)}%`"></div>
                    </div>
                </button>
            </template>
            <div x-show="!flowSubcategories.length" class="text-sm text-base-content/40">No subcategories yet</div>
        </div>
    </div>

    <div class="mt-4" x-show="flowPayees.length">
        <div class="flex items-center justify-between mb-2">
            <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50">Top Payees</div>
            <div class="text-[10px] text-base-content/40">Tap to filter</div>
        </div>
        <div class="space-y-2">
            <template x-for="payee in flowPayees" :key="payee.name">
                <button class="w-full flex items-center justify-between px-2 py-1.5 rounded-lg hover:bg-base-200/60 transition-colors"
                        @click="selectPayee(payee.name)">
                    <div class="flex flex-col text-left min-w-0">
                        <span class="text-sm font-medium truncate" x-text="payee.name"></span>
                        <span class="text-[10px] text-base-content/40" x-text="`${payee.count} txns`"></span>
                    </div>
                    <span class="text-xs font-mono text-base-content/50"
                          x-text="formatCurrency(payee.amount, $store.transactions.activeStats.currency)"></span>
                </button>
            </template>
        </div>
    </div>
</div>
