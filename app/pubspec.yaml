name: gullak
description: "Gullak — polished mobile expense tracker for self-hosted Actual Budget"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State + routing
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Local DB
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # HTTP
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.3

  # Permissions / SMS
  permission_handler: ^12.0.1
  another_telephony: ^0.4.1

  # Utilities
  intl: ^0.20.2
  logger: ^2.5.0
  uuid: ^4.5.1
  collection: ^1.18.0

  # Backup / share
  share_plus: ^10.1.2
  file_picker: ^8.1.4

  # UX
  flutter_slidable: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  drift_dev: ^2.20.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
