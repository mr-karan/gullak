name: gullak
description: "Gullak — local-first mobile expense tracker."
publish_to: 'none'
version: 0.2.1+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State + routing
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Local DB
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # HTTP
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.3

  # Permissions / SMS
  permission_handler: ^12.0.1
  another_telephony: ^0.4.1

  # Utilities
  intl: ^0.20.2
  logger: ^2.5.0
  uuid: ^4.5.1
  collection: ^1.18.0
  crypto: ^3.0.5

  # Backup / share
  share_plus: ^10.1.2
  file_picker: ^8.1.4

  # Photo capture / pick for receipt → expense
  image_picker: ^1.1.2
  receive_sharing_intent: ^1.8.1

  # UX
  # Home-screen long-press shortcut → jump straight to Quick Entry.
  # flutter.dev first-party plugin.
  quick_actions: ^1.0.7
  flutter_slidable: ^4.0.0
  flutter_local_notifications: ^21.0.0
  phosphor_flutter: ^2.1.0
  # Runs the SMS enrichment HTTP call after a notification reply when
  # the app process may be dead — receivers can't block on network.
  workmanager: ^0.9.0+3
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  drift_dev: ^2.20.3
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  # OFL license texts for the bundled fonts, loaded at runtime and surfaced in
  # Settings → About → Open source licenses via LicenseRegistry (main.dart).
  assets:
    - assets/fonts/Fraunces-OFL.txt
    - assets/fonts/Inter-OFL.txt
    - assets/fonts/JetBrainsMono-OFL.txt

  # Editorial type, bundled (not fetched at runtime) so the offline-first app
  # keeps its typography on a first launch with no network. Variable fonts:
  # one file per family covers every weight the theme requests. OFL-licensed —
  # see the *-OFL.txt files alongside each font.
  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0A6E58"
  adaptive_icon_foreground: "assets/icon/icon-foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
