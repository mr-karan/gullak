<div x-show="$store.transactions.showEditModal" 
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 flex items-end md:items-center justify-center bg-black/50 backdrop-blur-sm"
     @click.self="$store.transactions.closeEdit()"
     x-cloak>
    <div class="bg-base-100 rounded-t-2xl md:rounded-2xl shadow-2xl w-full md:max-w-md md:mx-4 overflow-hidden max-h-[90vh] overflow-y-auto"
         x-show="$store.transactions.showEditModal"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95">
        
        <!-- Modal Header -->
        <div class="px-6 py-4 border-b border-base-200/60 flex items-center justify-between">
            <h3 class="text-lg font-semibold">Edit Transaction</h3>
            <button @click="$store.transactions.closeEdit()" class="w-8 h-8 rounded-lg hover:bg-base-200 flex items-center justify-center text-base-content/50 hover:text-base-content transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <!-- Modal Body -->
        <template x-if="$store.transactions.editing">
            <div class="p-6 space-y-4">
                <!-- Payee -->
                <div>
                    <label class="block text-xs font-medium text-base-content/60 mb-1.5">Payee</label>
                    <input type="text" x-model="$store.transactions.editing.payee" class="input-box w-full" />
                </div>

                <!-- Date & Amount -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-base-content/60 mb-1.5">Date</label>
                        <input type="date" x-model="$store.transactions.editing.date" class="input-box w-full" />
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-base-content/60 mb-1.5">Amount</label>
                        <input type="number" step="0.01" x-model="$store.transactions.editing.amount" class="input-box w-full" />
                    </div>
                </div>

                <!-- Expense Account -->
                <div>
                    <label class="block text-xs font-medium text-base-content/60 mb-1.5">Category</label>
                    <input type="text" x-model="$store.transactions.editing.expense_account" class="input-box w-full" placeholder="Expenses:Food:Groceries" />
                </div>

                <!-- Payment Account -->
                <div>
                    <label class="block text-xs font-medium text-base-content/60 mb-1.5">Payment Account</label>
                    <input type="text" x-model="$store.transactions.editing.payment_account" class="input-box w-full" placeholder="Assets:Bank:HDFC" />
                </div>

                <!-- Note -->
                <div>
                    <label class="block text-xs font-medium text-base-content/60 mb-1.5">Note (optional)</label>
                    <input type="text" x-model="$store.transactions.editing.note" class="input-box w-full" placeholder="Add a note..." />
                </div>
            </div>
        </template>

        <!-- Modal Footer -->
        <div class="px-6 py-4 border-t border-base-200/60 flex justify-end gap-3">
            <button @click="$store.transactions.closeEdit()" class="px-4 py-2 rounded-lg text-sm font-medium text-base-content/60 hover:text-base-content hover:bg-base-200 transition-colors">
                Cancel
            </button>
            <button @click="$store.transactions.saveEdit()" class="px-4 py-2 rounded-lg text-sm font-medium bg-primary text-white hover:bg-primary/90 transition-colors">
                Save Changes
            </button>
        </div>
    </div>
</div>
