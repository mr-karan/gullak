# Gullak Production Docker Compose
#
# Quick Start (Standalone):
#   1. cp .env.production.example .env
#   2. Edit .env and set your OPENROUTER_API_KEY (required)
#   3. docker compose -f docker-compose.prod.yml up -d --build
#   4. Open http://localhost:8000
#
# With Reverse Proxy (Caddy/Traefik/nginx):
#   1. Set GULLAK_DATA_DIR to your persistent storage path
#   2. Set GULLAK_PROXY_NETWORK to your proxy's network name
#   3. docker compose -f docker-compose.prod.yml up -d --build
#   4. Connect containers to proxy network (see docs/deployment.md)
#
# See docs/deployment.md for full deployment guide.

services:
  gullak:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GULLAK_UID: ${GULLAK_UID:-1000}
        GULLAK_GID: ${GULLAK_GID:-1000}
    image: gullak:latest
    container_name: gullak
    restart: always
    ports:
      - "${GULLAK_HOST_PORT:-127.0.0.1:8000}:8000"
    volumes:
      - ${GULLAK_DATA_DIR:-gullak_data}:/data
    env_file:
      - .env
    environment:
      - TZ=${TZ:-UTC}
      - GULLAK_DATA_DIR=/data
      - GULLAK_LEDGER_FILE=${GULLAK_LEDGER_FILE:-main.ledger}
      - GULLAK_TIMEZONE=${TZ:-UTC}
      - GULLAK_DEFAULT_CURRENCY=${GULLAK_DEFAULT_CURRENCY:-USD}
      - GULLAK_PAISA_URL=http://paisa:7500
      - GULLAK_WHATSAPP_BRIDGE_URL=http://whatsapp-bridge:3000
      - GULLAK_DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - gullak-internal
      - default
    depends_on:
      whatsapp-bridge:
        condition: service_started  # Don't wait for healthy - WhatsApp needs QR scan

  paisa:
    image: ananthakumaran/paisa:latest
    container_name: paisa
    restart: always
    user: "0:${GULLAK_GID:-1000}"
    command: ["/bin/sh", "-c", "umask 0002 && exec paisa serve"]
    ports:
      - "${PAISA_HOST_PORT:-127.0.0.1:7500}:7500"
    volumes:
      # NOT read-only - paisa needs to write paisa.db
      - ${GULLAK_DATA_DIR:-gullak_data}:/root/Documents/paisa
    environment:
      - TZ=${TZ:-UTC}
      - PAISA_CONFIG=/root/Documents/paisa/paisa.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7500"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - gullak-internal
      - default
    depends_on:
      gullak:
        condition: service_healthy

  whatsapp-bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    image: gullak-whatsapp-bridge:latest
    container_name: whatsapp-bridge
    restart: always
    environment:
      - WEBHOOK_URL=http://gullak:8000/api/whatsapp/webhook
      - GULLAK_WHATSAPP_API_KEY=${GULLAK_WHATSAPP_API_KEY:-}
      - LOG_LEVEL=info
      - NODE_ENV=production
    volumes:
      - ${GULLAK_DATA_DIR:-gullak_data}/whatsapp-session:/data/whatsapp-session
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - gullak-internal

networks:
  gullak-internal:
    # Internal network for service communication
    internal: true
  default:
    # Default network - can be connected to external proxy network

# Named volume (used when GULLAK_DATA_DIR is not set)
volumes:
  gullak_data:
    name: gullak_data
