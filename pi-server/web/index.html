                    <button @click="$store.transactions.load()" class="p-2 rounded-lg text-base-content/50 hover:text-base-content hover:bg-base-200/80 transition-colors flex-shrink-0" title="Refresh">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 5.5A10 10 0 1 1 11.26 2.8"/></svg>
                    </button>
                </div>

                <!-- Filter toolbar (sticky) -->
                <div class="border-b border-base-200/60 bg-base-100 px-4 md:px-8 py-3 flex flex-col gap-3 flex-shrink-0">
                    <div class="flex flex-wrap items-center gap-2">
                        <!-- Date range -->
                        <select class="input-box h-9 text-sm w-auto"
                                x-model="$store.transactions.rangeKey"
                                @change="$store.transactions.setRange($store.transactions.rangeKey)">
                            <option value="month">This month</option>
                            <option value="last-month">Last month</option>
                            <option value="3m">Last 3 months</option>
                            <option value="year">This year</option>
                            <option value="custom">Custom</option>
                        </select>
                        <template x-if="$store.transactions.rangeKey === 'custom'">
                            <div class="flex items-center gap-1.5">
                                <input type="date" class="input-box h-9 text-sm w-auto" x-model="$store.transactions.customStart" @change="$store.transactions.applyCustomRange()" />
                                <span class="text-base-content/40">–</span>
                                <input type="date" class="input-box h-9 text-sm w-auto" x-model="$store.transactions.customEnd" @change="$store.transactions.applyCustomRange()" />
                            </div>
                        </template>

                        <!-- Account filter (hidden when account-scoped) -->
                        <select x-show="!$store.transactions.accountScoped"
                                class="input-box h-9 text-sm w-auto"
                                x-model="$store.transactions.accountId"
                                @change="$store.transactions.setAccount($store.transactions.accountId)">
                            <option value="">All accounts</option>
                            <template x-for="acc in $store.transactions.accounts" :key="acc.id">
                                <option :value="acc.id" x-text="acc.name"></option>
                            </template>
                        </select>

                        <!-- Category filter (grouped) -->
                        <select class="input-box h-9 text-sm w-auto" x-model="$store.transactions.categoryFilter">
                            <option value="">All categories</option>
                            <template x-for="grp in $store.transactions.categoryGroups" :key="grp.group">
                                <optgroup :label="grp.group">
                                    <template x-for="c in grp.categories" :key="c.id">

                                    </template>
                                </optgroup>
                            </template>
                        </select>

                        <!-- Uncategorized toggle -->
                        <button @click="$store.transactions.toggleUncategorized()"
                                class="h-9 px-3 rounded-lg text-sm font-medium border transition-colors"
                                :class="$store.transactions.uncategorizedOnly ? 'bg-warning/15 text-warning border-warning/30' : 'border-base-300 text-base-content/60 hover:text-base-content'">
                            Uncategorized
                        </button>

                        <!-- Search -->
                        <div class="relative flex-1 min-w-[10rem]">
                            <svg class="absolute left-3 top-2.5 w-4 h-4 text-base-content/40" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" x-model="$store.transactions.search" @input="$store.transactions.queueFilterUpdate()"
                                   placeholder="Search payee, memo, location..." class="input-box h-9 pl-9 w-full text-sm" />
                        </div>
                    </div>

                    <!-- Active filter chips + count -->
                    <div class="flex flex-wrap items-center gap-2" x-show="$store.transactions.activeChips.length">
                        <template x-for="chip in $store.transactions.activeChips" :key="chip.type">
                            <button class="filter-pill active inline-flex items-center gap-1"
                                    @click="$store.transactions.clearChip(chip.type)">
                                <span x-text="chip.label"></span>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </template>
                        <span class="text-[11px] text-base-content/40 ml-auto" x-text="`${$store.transactions.resultCount} shown`"></span>

                </div>

                <!-- Register -->
                <div class="flex-1 overflow-y-auto custom-scrollbar" @click="$store.transactions.closeCatCombo()">
                    <!-- Cap notice -->
                    <div x-show="$store.transactions.capped" class="px-4 md:px-8 py-2 text-xs text-warning bg-warning/10 border-b border-warning/20">

                    </div>

                    <!-- Loading -->
                    <template x-if="$store.transactions.loadingList">
                        <div class="flex flex-col items-center justify-center h-64 text-base-content/40">
                            <div class="loading loading-dots loading-sm mb-2"></div>
                            <p>Loading transactions</p>
                        </div>
                    </template>

                    <!-- Empty -->
                    <template x-if="!$store.transactions.loadingList && $store.transactions.resultCount === 0">
                        <div class="flex flex-col items-center justify-center h-64 text-base-content/40">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            <p>No transactions found</p>
                        </div>
                    </template>

                    <!-- Date-grouped rows -->
                    <div x-show="!$store.transactions.loadingList && $store.transactions.resultCount > 0">
                        <template x-for="group in $store.transactions.grouped" :key="group.date">
                            <div>
                                <div class="register-date-header">
                                    <!-- Older dates ("Fri, 10 Jul") already carry the date — only
                                         suffix relative labels (Today/Yesterday/weekday, no digits). -->
                                    <span x-text="/\d/.test(formatDateRelative(group.date)) ? formatDateRelative(group.date) : formatDateRelative(group.date) + ' · ' + fmtDayMonth(group.date)"></span>
                                    <span class="font-mono normal-case tracking-normal" :class="group.netCents < 0 ? 'money-neg' : 'money-pos'" x-text="fmtCentsSigned(group.netCents, $store.transactions.currency)"></span>
                                </div>
                                <template x-for="txn in group.rows" :key="txn.id">
                                    <div class="register-row group">
                                        <!-- Date -->
                                        <div class="col-date hidden sm:block" x-text="fmtDayMonth(txn.date)"></div>
                                        <!-- Payee + memo -->
                                        <div class="min-w-0">
                                            <div class="font-medium text-base-content truncate flex items-center gap-1.5">
                                                <span x-text="txn.payee"></span>
                                                <span x-show="txn.uncategorized" class="warn-dot" title="Uncategorized"></span>
                                            </div>
                                            <div class="text-[11px] text-base-content/50 truncate" x-show="txn.note" x-text="txn.note"></div>
                                            <!-- Mobile line 2 -->
                                            <div class="sm:hidden text-[11px] text-base-content/50 truncate mt-0.5"
                                                 x-text="[($store.transactions.accountScoped ? '' : txn.account), (txn.category || 'Uncategorized')].filter(Boolean).join(' · ')"></div>
                                        </div>
                                        <!-- Category (inline editable combobox) -->
                                        <div class="relative hidden sm:block" @click.stop>
                                            <button @click="$store.transactions.editingCatFor === txn.id ? $store.transactions.closeCatCombo() : $store.transactions.openCatCombo(txn.id)"
                                                    class="w-full text-left text-xs px-2 py-1 rounded-md border border-transparent hover:border-base-300 transition-colors truncate"
                                                    :class="txn.uncategorized ? 'text-warning' : 'text-base-content/70'">
                                                <span x-text="txn.category || 'Uncategorized'"></span>
                                            </button>
                                            <div class="cat-combo-menu" x-show="$store.transactions.editingCatFor === txn.id" x-cloak>
                                                <div class="p-1.5 border-b border-base-200/60">
                                                    <input type="text" x-model="$store.transactions.catQuery" placeholder="Search category..."
                                                           class="input-box h-8 w-full text-xs" @click.stop />
                                                </div>
                                                <template x-for="grp in $store.transactions.filteredCategoryGroups()" :key="grp.group">
                                                    <div>
                                                        <div class="cat-combo-group" x-text="grp.group"></div>
                                                        <template x-for="c in grp.categories" :key="c.id">
                                                            <button class="cat-combo-item"
                                                                    :class="txn.categoryId === c.id ? 'active' : ''"
                                                                    @click="$store.transactions.setCategoryFor(txn.id, c.id, c.name)"
                                                                    x-text="c.name"></button>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                        <!-- Account (hidden when scoped) -->
                                        <div class="hidden sm:block text-xs text-base-content/50 truncate"
                                             x-show="!$store.transactions.accountScoped" x-text="txn.account"></div>
                                        <!-- Amount -->
                                        <div class="col-amount font-semibold" :class="txn.amountCents < 0 ? 'money-neg' : 'money-pos'"
                                             x-text="fmtCentsSigned(txn.amountCents, $store.transactions.currency)"></div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Insights View -->
        <template x-if="$store.router.view === 'insights'">
            <div class="flex-1 flex flex-col h-full bg-base-50/50 min-h-0" x-data="insightsView()">
                <!-- Header -->
                <div class="min-h-14 md:h-16 border-b border-base-200/60 bg-base-100 flex items-center justify-between px-4 md:px-8 py-3 md:py-0 flex-shrink-0">
                    <div>
                        <h2 class="view-title font-display text-2xl md:text-3xl tracking-tight ledger-rule">Insights</h2>
                        <p class="text-[10px] md:text-xs text-base-content/40 mt-0.5">Spending trends and breakdowns</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <!-- Year Selector -->
                        <template x-if="data">
                            <div class="flex items-center gap-1 bg-base-200/60 rounded-lg p-0.5">
                                <template x-for="y in availableYears" :key="y">
                                    <button @click="store.setYear(y)"
                                            class="px-3 py-1.5 rounded-md text-xs font-semibold transition-all duration-150"
                                            :class="store.year === y ? 'bg-base-100 text-primary shadow-sm' : 'text-base-content/50 hover:text-base-content'">
                                        <span x-text="y"></span>
                                    </button>
                                </template>
                            </div>
                        </template>
                        <!-- Loading indicator -->
                        <div x-show="store.loading" class="w-5 h-5 border-2 border-primary/30 border-t-primary rounded-full animate-spin"></div>
                    </div>
                </div>

                <!-- Content -->
                <div class="flex-1 overflow-auto p-4 md:p-6 custom-scrollbar space-y-6">

                    <!-- Section 1: this month vs last month -->
                    <template x-if="store.compare">
                        <div class="grid gap-3 sm:grid-cols-3">
                            <template x-for="metric in [
                                    { key: 'income', label: 'Income', posGood: true },
                                    { key: 'spending', label: 'Spending', posGood: false },
                                    { key: 'net', label: 'Net', posGood: true }
                                ]" :key="metric.key">
                                <div class="card-elevated p-4">
                                    <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50" x-text="metric.label"></div>
                                    <div class="font-mono text-xl font-semibold mt-1" x-text="fmtAmount(store.compare.thisMonth[metric.key] / 100) || '₹0'"></div>
                                    <div class="text-[11px] mt-1 font-mono"
                                         :class="((store.compare.delta[metric.key] >= 0) === metric.posGood) ? 'money-pos' : 'money-neg'">
                                        <span x-text="(store.compare.delta[metric.key] >= 0 ? '+' : '') + (fmtAmount(store.compare.delta[metric.key] / 100) || '₹0')"></span>
                                        <span class="text-base-content/40">vs last month</span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Section 2: spending by category (current month) -->
                    <div class="card-elevated p-4 md:p-5" x-show="store.byCategory.length">
                        <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50 mb-3">Spending by category · this month</div>
                        <div class="space-y-2.5">
                            <template x-for="cat in store.byCategory" :key="cat.name">
                                <div>
                                    <div class="flex items-center justify-between mb-1">
                                        <span class="text-sm text-base-content truncate" x-text="cat.name"></span>
                                        <span class="text-xs font-mono text-base-content/60" x-text="fmtAmount(cat.amountCents / 100)"></span>
                                    </div>
                                    <div class="insight-bar-track">
                                        <div class="insight-bar-fill" :style="`width:${cat.percent.toFixed(1)}%`"></div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Section 3: top payees (current month) -->
                    <div class="card-elevated p-4 md:p-5" x-show="store.topPayees.length">
                        <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50 mb-3">Top payees · this month</div>
                        <div class="divide-y divide-base-200/60">
                            <template x-for="p in store.topPayees" :key="p.name">
                                <div class="flex items-center justify-between py-2">
                                    <span class="text-sm text-base-content truncate" x-text="p.name"></span>
                                    <span class="text-xs font-mono text-base-content/60" x-text="fmtAmount(p.amountCents / 100)"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Allocation (M5): equity vs MF vs cash. Hidden until holdings exist. -->
                    <div class="card-elevated p-4 md:p-5" x-show="store.allocation.length">
                        <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50 mb-3">Allocation</div>
                        <div class="space-y-2.5">
                            <template x-for="a in store.allocation" :key="a.label">
                                <div>
                                    <div class="flex items-center justify-between mb-1">
                                        <span class="text-sm text-base-content" x-text="a.label"></span>
                                        <span class="text-xs font-mono text-base-content/60">
                                            <span x-text="fmtAmount(a.cents / 100)"></span>
                                            <span class="text-base-content/40" x-text="' · ' + a.percent.toFixed(0) + '%'"></span>
                                        </span>
                                    </div>
                                    <div class="insight-bar-track"><div class="insight-bar-fill" :style="`width:${a.percent.toFixed(1)}%`"></div></div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="text-[10px] font-semibold uppercase tracking-wider text-base-content/50 pt-2">Category × month</div>

                    <!-- Loading State -->
<template x-if="store.loading && !data">
    <div class="flex items-center justify-center h-64">
        <span class="loading loading-spinner text-primary"></span>
    </div>
</template>

<!-- Empty State -->
<template x-if="!store.loading && data && data.categories.length === 0">
    <div class="flex flex-col items-center justify-center h-64 text-base-content/40">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-4 opacity-40"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <p class="text-sm">No expense data for <span x-text="store.year"></span></p>
    </div>
</template>

<!-- Grid -->
<template x-if="data && data.categories.length > 0">
    <div class="reports-grid-wrapper card-elevated overflow-hidden">
        <div class="reports-grid-scroll overflow-x-auto custom-scrollbar">
            <table class="reports-grid w-full">
                <!-- Header -->
                <thead>
                    <tr class="reports-grid-header">
                        <th class="reports-grid-sticky-col text-left py-3 px-4 text-xs font-semibold uppercase tracking-wider text-base-content/50">
                            Category
                        </th>
                        <template x-for="(month, i) in data.months" :key="i">
                            <th class="py-3 px-3 text-right text-xs font-semibold uppercase tracking-wider text-base-content/50 whitespace-nowrap"
                                x-text="month"></th>
                        </template>
                        <th class="py-3 px-3 text-right text-xs font-semibold uppercase tracking-wider text-base-content/40 whitespace-nowrap">Avg</th>
                        <th class="py-3 px-3 text-right text-xs font-semibold uppercase tracking-wider text-primary whitespace-nowrap">Total</th>
                    </tr>
                </thead>

                <!-- Each category gets its own tbody (valid HTML, avoids nesting) -->
                <template x-for="cat in data.categories" :key="cat.name">
                    <tbody>
                        <!-- Category Row -->
                        <tr class="reports-grid-cat-row cursor-pointer transition-colors"
                            @click="store.toggleCategory(cat.name)">
                            <td class="reports-grid-sticky-col py-2.5 px-4">
                                <div class="flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                                         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                         class="text-base-content/30 transition-transform duration-200 flex-shrink-0"
                                         :class="store.expandedCategories[cat.name] && 'rotate-90'">
                                            <polyline points="9 18 15 12 9 6"/>
                                    </svg>
                                    <span class="text-sm font-semibold text-base-content truncate" x-text="cat.name"></span>
                                </div>
                            </td>
                            <template x-for="(val, mi) in cat.months" :key="mi">
                                <td class="py-2.5 px-3 text-right font-mono text-sm whitespace-nowrap"
                                    :class="[
                                        val > 0 ? 'text-base-content reports-grid-cell-clickable' : 'text-base-content/20',
                                        (store.drawer.open && store.drawer.category === cat.name && !store.drawer.subcategory && store.drawer.monthIndex === mi) ? 'reports-grid-cell-active' : ''
                                    ]"
                                    @click.stop="val > 0 && store.openDrawer(cat.name, '', mi, val)">
                                    <span x-text="val > 0 ? fmtCompact(val) : '—'"></span>
                                </td>
                            </template>
                            <td class="py-2.5 px-3 text-right font-mono text-sm text-base-content/50 whitespace-nowrap"
                                x-text="fmtCompact(cat.average) || '—'"></td>
                            <td class="py-2.5 px-3 text-right font-mono text-sm font-semibold text-base-content whitespace-nowrap"
                                x-text="fmtCompact(cat.total) || '—'"></td>
                        </tr>

                        <!-- Subcategory Rows -->
                        <template x-for="sub in cat.subcategories" :key="sub.name">
                            <tr class="reports-grid-sub-row transition-colors"
                                x-show="store.expandedCategories[cat.name]"
                                x-transition:enter="transition ease-out duration-150"
                                x-transition:enter-start="opacity-0"
                                x-transition:enter-end="opacity-100">
                                <td class="reports-grid-sticky-col reports-grid-sticky-col-sub py-2 px-4 pl-10">
                                    <span class="text-xs text-base-content/50 truncate block" x-text="sub.name"></span>
                                </td>
                                <template x-for="(val, mi) in sub.months" :key="mi">
                                    <td class="py-2 px-3 text-right font-mono text-xs whitespace-nowrap"
                                        :class="[
                                            val > 0 ? 'text-base-content/60 reports-grid-cell-clickable' : 'text-base-content/15',
                                            (store.drawer.open && store.drawer.category === cat.name && store.drawer.subcategory === sub.name && store.drawer.monthIndex === mi) ? 'reports-grid-cell-active' : ''
                                        ]"
                                        @click.stop="val > 0 && store.openDrawer(cat.name, sub.name, mi, val)">
                                        <span x-text="val > 0 ? fmtCompact(val) : '—'"></span>
                                    </td>
                                </template>
                                <td class="py-2 px-3 text-right font-mono text-xs text-base-content/35 whitespace-nowrap"
                                    x-text="fmtCompact(sub.average) || '—'"></td>
                                <td class="py-2 px-3 text-right font-mono text-xs text-base-content/60 whitespace-nowrap"
                                    x-text="fmtCompact(sub.total) || '—'"></td>
                            </tr>
                        </template>
                    </tbody>
                </template>

                <!-- Footer -->
                <tfoot>
                    <tr class="reports-grid-footer">
                        <td class="reports-grid-sticky-col py-3 px-4 text-sm font-semibold text-base-content">
                            Total
                        </td>
                        <template x-for="(val, mi) in data.month_totals" :key="mi">
                            <td class="py-3 px-3 text-right font-mono text-sm font-semibold whitespace-nowrap"
                                :class="val > 0 ? 'text-base-content' : 'text-base-content/20'">
                                <span x-text="val > 0 ? fmtCompact(val) : '—'"></span>
                            </td>
                        </template>
                        <td class="py-3 px-3 text-right font-mono text-sm font-semibold text-base-content/50 whitespace-nowrap"
                            x-text="fmtCompact(data.grand_average) || '—'"></td>
                        <td class="py-3 px-3 text-right font-mono text-sm font-bold text-primary whitespace-nowrap"
                            x-text="fmtAmount(data.grand_total) || '—'"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</template>

<!-- Drill-Down Drawer -->
<template x-if="store.drawer.open">
    <div @keydown.window.escape="store.closeDrawer()">
        <!-- Backdrop -->
        <div class="fixed inset-0 bg-black/30 backdrop-blur-sm z-40"
             @click="store.closeDrawer()"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0">
        </div>

        <!-- Desktop: Right Drawer / Mobile: Bottom Sheet -->
        <div class="reports-drill-drawer fixed z-50
                    md:top-0 md:right-0 md:bottom-0 md:w-[400px]
                    max-md:bottom-0 max-md:left-0 max-md:right-0 max-md:max-h-[75vh] max-md:rounded-t-2xl"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="md:translate-x-full max-md:translate-y-full"
             x-transition:enter-end="md:translate-x-0 max-md:translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="md:translate-x-0 max-md:translate-y-0"
             x-transition:leave-end="md:translate-x-full max-md:translate-y-full"
             @click.stop>

            <!-- Mobile drag handle -->
            <div class="md:hidden flex justify-center pt-3 pb-1">
                <div class="w-10 h-1 rounded-full bg-base-content/20"></div>
            </div>

            <!-- Header -->
            <div class="flex items-start justify-between px-5 py-4 border-b border-base-content/8">
                <div class="min-w-0">
                    <h3 class="text-base font-semibold text-base-content truncate">
                        <span x-text="store.drawer.category"></span>
                        <template x-if="store.drawer.subcategory">
                            <span class="text-base-content/40 font-normal">
                                / <span x-text="store.drawer.subcategory"></span>
                            </span>
                        </template>
                    </h3>
                    <p class="text-sm text-base-content/50 mt-0.5">
                        <span x-text="store.drawer.monthName"></span>
                        <span class="mx-1.5 text-base-content/20">&mdash;</span>
                        <span class="font-mono font-semibold text-base-content/70" x-text="fmtAmount(store.drawer.total)"></span>
                    </p>
                </div>
                <button @click="store.closeDrawer()"
                        class="btn-icon btn-icon-sm flex-shrink-0 ml-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto custom-scrollbar">
                <!-- Loading -->
                <template x-if="store.drawer.loading">
                    <div class="flex items-center justify-center py-16">
                        <span class="loading loading-spinner text-primary"></span>
                    </div>
                </template>

                <!-- Empty -->
                <template x-if="!store.drawer.loading && store.drawer.transactions.length === 0">
                    <div class="flex flex-col items-center justify-center py-16 text-base-content/40">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3 opacity-40"><path d="M3 3h18v18H3z"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
                        <p class="text-sm">No transactions found</p>
                    </div>
                </template>

                <!-- Transaction list -->
                <template x-if="!store.drawer.loading && store.drawer.transactions.length > 0">
                    <div>
                        <div class="px-5 py-2.5 text-xs text-base-content/40 font-medium">
                            <span x-text="store.drawer.count"></span> transactions
                        </div>
                        <template x-for="txn in store.drawer.transactions" :key="txn.id">
                            <div class="flex items-center gap-3 px-5 py-3 border-b border-base-content/4 last:border-b-0 hover:bg-base-content/2 transition-colors">

            </div>
        </div>

                </div>
            </div>
        </template>

        <!-- ============================ HOLDINGS VIEW ======================= -->

                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

                                            </span>
                                        </template>
                                        <template x-if="d.status === 'yes'">
                                            <button @click="$store.desires.setStatus(d.id,'bought')" class="btn btn-xs btn-ghost">🛍️ Bought</button>
                                        </template>
                                        <button @click="$store.desires.openDetail(d.id)" class="ml-auto text-[11px] text-base-content/50 hover:text-base-content">
                                            <span x-text="(d.commentCount||0) + ' 💬'"></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Detail slide-over -->
                <template x-if="$store.desires.showDetail">
                    <div>
                        <div class="fixed inset-0 bg-black/40 z-40" @click="$store.desires.closeDetail()"></div>
                        <div class="fixed z-50 top-0 right-0 bottom-0 w-full md:w-[440px] bg-base-100 border-l border-base-200/60 flex flex-col shadow-xl">
                            <template x-if="$store.desires.detail">
                                <div class="flex flex-col h-full">
                                    <div class="flex items-start justify-between px-5 py-4 border-b border-base-200/60">
                                        <div class="min-w-0">
                                            <div class="font-semibold text-base truncate" x-text="$store.desires.detail.desire.title"></div>
                                            <div class="text-xs text-base-content/50" x-text="$store.desires.personName($store.desires.detail.desire.person)"></div>
                                        </div>
                                        <button @click="$store.desires.closeDetail()" class="p-1.5 rounded hover:bg-base-200 text-base-content/50">
                                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                        </button>
                                    </div>
                                    <div class="flex-1 overflow-y-auto custom-scrollbar px-5 py-4 space-y-4">
                                        <!-- Photo strip -->
                                        <div class="flex gap-2 flex-wrap">
                                            <template x-for="ph in $store.desires.detail.photos" :key="ph.id">
                                                <div x-init="$store.desires.loadPhoto($store.desires.detail.desire.id, ph.id)" class="w-20 h-20 rounded-lg bg-base-200 overflow-hidden">
                                                    <img x-show="$store.desires.photoUrls[ph.id]" :src="$store.desires.photoUrls[ph.id]" class="w-full h-full object-cover" alt="" />
                                                </div>
                                            </template>
                                            <label class="w-20 h-20 rounded-lg border border-dashed border-base-300 flex items-center justify-center text-base-content/40 cursor-pointer hover:bg-base-200"
                                                   x-show="$store.desires.detail.photos.length < 6">
                                                <input type="file" accept="image/*" class="hidden" @change="$store.desires.uploadPhoto($event)" />
                                                <span class="text-2xl">＋</span>
                                            </label>
                                        </div>
                                        <!-- Editable cost -->
                                        <div>
                                            <label class="block text-xs text-base-content/60 mb-1">Estimated cost (₹)</label>
                                            <input type="number" min="0" class="input-box w-full" :value="Math.round($store.desires.detail.desire.estCostCents/100)"
                                                   @change="$store.desires.updateCost($event.target.value)" />
                                        </div>
                                        <!-- Why -->
                                        <div class="desire-why text-sm" x-show="$store.desires.detail.desire.why" x-text="$store.desires.detail.desire.why"></div>
                                        <!-- Affordability -->
                                        <div class="text-[11px] text-base-content/50" x-show="$store.desires.affordability">
                                            ~<span x-text="fmtCentsCompact($store.desires.affordability?.avgSurplusCents || 0)"></span>/mo avg surplus
                                            <template x-if="$store.desires.monthsOfSurplus($store.desires.detail.desire.estCostCents)">
                                                <span> · ≈ <span x-text="$store.desires.monthsOfSurplus($store.desires.detail.desire.estCostCents)"></span> months of surplus</span>
                                            </template>
                                        </div>
                                        <!-- Bought: link a transaction -->
                                        <template x-if="$store.desires.detail.desire.status === 'bought'">
                                            <div class="rounded-lg bg-base-200/60 p-3 space-y-2">
                                                <div class="text-xs font-medium">Link the real transaction</div>
                                                <template x-if="$store.desires.detail.desire.boughtTransactionId">
                                                    <div class="text-[11px] text-pos money-pos">Linked ✓</div>
                                                </template>
                                                <template x-for="t in $store.desires.recentTxns" :key="t.id">
                                                    <button @click="$store.desires.linkTransaction(t.id)" class="w-full flex items-center justify-between text-xs px-2 py-1.5 rounded hover:bg-base-100">
                                                        <span class="truncate" x-text="t.payeeName + ' · ' + t.date"></span>
                                                        <span class="font-mono flex-shrink-0" x-text="fmtCents(Math.abs(t.amountCents))"></span>
                                                    </button>
                                                </template>
                                                <div x-show="!$store.desires.recentTxns.length" class="text-[11px] text-base-content/40">No nearby transactions found.</div>
                                            </div>
                                        </template>
                                        <!-- Comments -->
                                        <div class="space-y-2">
                                            <div class="text-xs font-semibold text-base-content/60 uppercase tracking-wider">Comments</div>
                                            <template x-for="c in $store.desires.detail.comments" :key="c.id">
                                                <div class="text-sm">
                                                    <span class="font-medium" x-text="$store.desires.personName(c.person)"></span>
                                                    <span class="text-base-content/80" x-text="' ' + c.body"></span>
                                                </div>
                                            </template>
                                            <div x-show="!$store.desires.detail.comments.length" class="text-[11px] text-base-content/40">No comments yet.</div>
                                        </div>
                                    </div>
                                    <!-- Comment input -->
                                    <div class="px-5 py-3 border-t border-base-200/60 flex gap-2">
                                        <input type="text" x-model="$store.desires.commentBody" @keydown.enter="$store.desires.addComment()" placeholder="Add a comment..." class="input-box flex-1 h-9 text-sm" />
                                        <button @click="$store.desires.addComment()" class="btn btn-primary btn-sm" :disabled="!$store.desires.commentBody.trim()">Send</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Add modal -->
                <div x-show="$store.desires.showAdd" x-cloak class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/50" @click.self="$store.desires.showAdd = false">
                    <div class="card-elevated w-full max-w-md p-6 space-y-4 bg-base-100">
                        <h3 class="text-lg font-semibold">Add desire</h3>
                        <div>
                            <label class="block text-xs text-base-content/60 mb-1">Title</label>
                            <input type="text" x-model="$store.desires.addForm.title" class="input-box w-full" placeholder="Vinyl player" />
                        </div>
                        <div>
                            <label class="block text-xs text-base-content/60 mb-1">Estimated cost (₹)</label>
                            <input type="number" min="0" x-model="$store.desires.addForm.estRupees" class="input-box w-full" placeholder="25000" />
                        </div>
                        <div>
                            <label class="block text-xs text-base-content/60 mb-1">Why do I want this?</label>
                            <textarea x-model="$store.desires.addForm.why" rows="3" class="input-box w-full" placeholder="The why is the feature."></textarea>
                        </div>
                        <div class="text-[11px] text-base-content/50">Adding as <span class="font-medium" x-text="$store.profiles.active?.name || '—'"></span></div>
                        <div class="flex justify-end gap-2 pt-1">
                            <button class="btn btn-ghost btn-sm" @click="$store.desires.showAdd = false">Cancel</button>
                            <button class="btn btn-primary btn-sm" @click="$store.desires.saveAdd()"
                                    :disabled="$store.desires.saving || !$store.desires.addForm.title.trim() || !$store.desires.addForm.why.trim() || !$store.desires.addForm.estRupees">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

    </main>

    <!-- ===================== AGENT SIDE PANEL (desktop >=1024px) ========== -->
    <aside class="agent-panel hidden lg:flex lg:flex-col" :class="$store.sidebar.open ? '' : 'collapsed'" x-show="$store.setup.complete" x-cloak>
        <!-- Collapsed rail -->
        <template x-if="!$store.sidebar.open">
            <button @click="$store.sidebar.toggle()" class="flex-1 flex flex-col items-center justify-start pt-3 gap-2 hover:bg-base-200/60" title="Open assistant (⌘/)">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span class="agent-rail-btn">Assistant</span>
            </button>
        </template>

        <!-- Expanded panel -->
        <template x-if="$store.sidebar.open">
            <div class="flex flex-col h-full w-full">
                <div class="agent-header ledger-rule h-14 flex items-center justify-between px-4 flex-shrink-0">
                    <span class="font-semibold text-sm">Assistant</span>
                    <div class="flex items-center gap-1">
                        <button @click="$store.threads.create()" class="p-1.5 rounded hover:bg-base-200 text-base-content/50" title="New chat">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        </button>
                        <button @click="$store.sidebar.toggle()" class="p-1.5 rounded hover:bg-base-200 text-base-content/50" title="Collapse (⌘/)">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
                        </button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto custom-scrollbar px-4 py-4 space-y-3">
                    <template x-if="$store.chat.messages.length === 0 && !$store.chat.streaming">
                        <div class="text-xs text-base-content/40 py-6 text-center">Ask about your money — it knows the view you're on.</div>
                    </template>
                    <template x-for="msg in $store.chat.messages" :key="msg.id">
                        <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'" x-show="hasDisplayableContent(msg.content)">
                            <div :class="msg.role === 'user' ? 'agent-msg-user' : 'agent-msg-ai'">
                                <div class="message-content" x-html="formatMessage(msg.content)"></div>
                            </div>
                        </div>
                    </template>
                    <template x-if="$store.chat.streaming">
                        <div class="flex justify-start"><div class="agent-msg-ai"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>
                    </template>
                </div>

                <div class="px-3 py-3 border-t border-base-200/60 flex-shrink-0 space-y-2">
                    <!-- Suggested prompts per view -->
                    <div class="flex flex-wrap gap-1.5">
                        <template x-for="p in suggestedPrompts()" :key="p">
                            <button @click="$store.chat.input = p; $refs.panelInput.focus()" class="chip-toggle text-[11px]" x-text="p"></button>
                        </template>
                    </div>
                    <form @submit.prevent="$store.chat.send()" class="flex items-end gap-2">
                        <textarea x-model="$store.chat.input" x-ref="panelInput" rows="1"
                                  @keydown.enter.prevent="if(!$event.shiftKey) $store.chat.send()"
                                  placeholder="Ask anything..." class="chat-input-textarea flex-1"
                                  :disabled="$store.chat.streaming"></textarea>
                        <button type="submit" class="chat-send-button flex-shrink-0" :disabled="$store.chat.streaming || !$store.chat.input.trim()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </form>
                </div>
            </div>
        </template>
    </aside>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav md:hidden" x-show="$store.setup.complete" x-cloak>
        <div class="bottom-nav-inner">
            <button @click="$store.router.navigate('accounts')"
                    class="bottom-nav-item"
                    :class="$store.router.view === 'accounts' && 'active'">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M6 15h4"/></svg>
                <span>Accounts</span>
            </button>
            <button @click="$store.router.navigate('transactions')"
                    class="bottom-nav-item"
                    :class="$store.router.view === 'transactions' && 'active'">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                <span>Transactions</span>
            </button>
            <button @click="$store.router.navigate('insights')"
                    class="bottom-nav-item"
                    :class="$store.router.view === 'insights' && 'active'">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                <span>Insights</span>
            </button>
            <button @click="$store.router.navigate('chat')"
                    class="bottom-nav-item"
                    :class="$store.router.view === 'chat' && 'active'">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>Chat</span>
            </button>
        </div>
    </nav>

    <!-- Command Palette (Desktop) -->
    <div x-data="{ open: false, query: '', selectedIndex: 0, commands: [
            { id: 'accounts', label: 'Go to Accounts', shortcut: 'Alt+A', icon: 'card' },
            { id: 'transactions', label: 'Go to Transactions', shortcut: 'Alt+T', icon: 'list' },
            { id: 'insights', label: 'Go to Insights', shortcut: 'Alt+I', icon: 'grid' },
            { id: 'goals', label: 'Go to Goals', shortcut: '', icon: 'target' },
            { id: 'holdings', label: 'Go to Holdings', shortcut: '', icon: 'chart' },
            { id: 'desires', label: 'Go to Desires', shortcut: '', icon: 'heart' },
            { id: 'chat', label: 'Go to Chat', shortcut: '/', icon: 'chat' },
            { id: 'settings', label: 'Open Settings', shortcut: 'Alt+S', icon: 'settings' },
            { id: 'new-thread', label: 'New Chat Thread', shortcut: 'Alt+N', icon: 'plus' }
         ] }"
         x-init="Alpine.store('commandPalette', { open: false, toggle() { this.open = !this.open } });
                 $watch('$store.commandPalette.open', v => { open = v; if(v) { query = ''; selectedIndex = 0; $nextTick(() => $refs.cmdInput?.focus()); } })"
         x-show="open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="command-palette-backdrop hidden md:flex"
         @click.self="$store.commandPalette.open = false"
         x-cloak>
        <div class="command-palette animate-scale-in"
             @keydown.down.prevent="selectedIndex = Math.min(selectedIndex + 1, commands.filter(c => c.label.toLowerCase().includes(query.toLowerCase())).length - 1)"
             @keydown.up.prevent="selectedIndex = Math.max(selectedIndex - 1, 0)"
             @keydown.enter.prevent="
                const filtered = commands.filter(c => c.label.toLowerCase().includes(query.toLowerCase()));
                const cmd = filtered[selectedIndex];
                if (cmd) {
                    if (cmd.id === 'theme') $store.theme.toggle();
                    else if (cmd.id === 'new-thread') $store.threads.create();
                    else $store.router.navigate(cmd.id);
                    $store.commandPalette.open = false;
                }
             ">
            <div class="flex items-center gap-3 px-5 py-4 border-b border-base-200/60">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-base-content/40"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" 
                       x-ref="cmdInput"
                       x-model="query"
                       placeholder="Type a command or search..." 
                       class="flex-1 bg-transparent outline-none text-base text-base-content placeholder:text-base-content/40" />
                <kbd class="px-2 py-1 text-xs font-mono bg-base-200 rounded text-base-content/50">ESC</kbd>
            </div>
            <div class="command-palette-list">
                <template x-for="(cmd, index) in commands.filter(c => c.label.toLowerCase().includes(query.toLowerCase()))" :key="cmd.id">
                    <button class="command-palette-item w-full text-left"
                            :class="index === selectedIndex && 'selected'"
                            @click="
                                if (cmd.id === 'theme') $store.theme.toggle();
                                else if (cmd.id === 'new-thread') $store.threads.create();
                                else $store.router.navigate(cmd.id);
                                $store.commandPalette.open = false;
                            "
                            @mouseenter="selectedIndex = index">
                        <div class="command-palette-item-icon">
                            <template x-if="cmd.icon === 'chat'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'card'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'list'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'grid'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'book'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'settings'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'plus'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'moon'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'target'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'chart'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 9l-5 5-2-2-4 4"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'heart'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            </template>
                        </div>
                        <span class="command-palette-item-label" x-text="cmd.label"></span>
                        <span class="command-palette-item-shortcut" x-text="cmd.shortcut"></span>
                    </button>
                </template>
                <div x-show="commands.filter(c => c.label.toLowerCase().includes(query.toLowerCase())).length === 0" 
                     class="px-5 py-8 text-center text-sm text-base-content/40">
                    No commands found
                </div>
            </div>
            <div class="flex items-center justify-between px-5 py-3 border-t border-base-200/60 text-xs text-base-content/40">
                <div class="flex items-center gap-4">
                    <span class="flex items-center gap-1"><kbd class="px-1.5 py-0.5 bg-base-200 rounded">↑↓</kbd> Navigate</span>
                    <span class="flex items-center gap-1"><kbd class="px-1.5 py-0.5 bg-base-200 rounded">↵</kbd> Select</span>
                </div>
                <span class="flex items-center gap-1"><kbd class="px-1.5 py-0.5 bg-base-200 rounded">⌘K</kbd> to toggle</span>
            </div>
        </div>
    </div>

</div>

<!-- Connection / API Key Modal -->
<div x-data
     x-show="$store.connection.showModal"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/50"
     @click.self="$store.connection.connected && $store.connection.close()"
     x-cloak>
    <div class="card-elevated w-full max-w-md p-6 space-y-5 animate-scale-in bg-base-100">
        <div class="flex items-center gap-3">
            <div>
                <h2 class="font-display text-xl">Connect to your Gullak server</h2>
                <p class="text-xs text-base-content/50">Enter your API key to load your data.</p>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-base-content/70 mb-2">API Key</label>
                <input type="password"
                       x-model="$store.connection.apiKey"
                       @keydown.enter="$store.connection.save()"
                       placeholder="x-api-key"
                       autocomplete="off"
                       class="input-box w-full" />
            </div>
            <div>
                <label class="block text-sm font-medium text-base-content/70 mb-2">Server URL <span class="text-base-content/40 font-normal">(optional)</span></label>
                <input type="text"
                       x-model="$store.connection.serverUrl"
                       @keydown.enter="$store.connection.save()"
                       placeholder="Leave blank to use this server"
                       autocomplete="off"
                       class="input-box w-full" />
                <p class="text-[10px] text-base-content/40 mt-1">Only set this if your API runs on a different origin.</p>
            </div>

            <div x-show="$store.connection.error" class="text-xs text-error" x-text="$store.connection.error" x-cloak></div>
        </div>

        <div class="flex items-center justify-between gap-2 pt-1">
            <button class="btn btn-ghost btn-sm"
                    x-show="$store.connection.connected"
                    @click="$store.connection.clear()">Disconnect</button>
            <div class="flex-1"></div>
            <button class="btn btn-ghost btn-sm"
                    x-show="$store.connection.connected"
                    @click="$store.connection.close()">Cancel</button>
            <button class="btn btn-primary btn-sm"
                    @click="$store.connection.save()"
                    :disabled="$store.connection.checking">
                <span x-show="!$store.connection.checking">Connect</span>
                <span x-show="$store.connection.checking" class="loading loading-spinner loading-sm"></span>
            </button>
        </div>
    </div>
</div>

<!-- Toast Notifications -->
<div class="fixed bottom-24 md:bottom-6 right-4 md:right-6 left-4 md:left-auto z-50 flex flex-col gap-3 pointer-events-none"
     x-data="{ toasts: [] }"
     @notify.window="toasts.push($event.detail); setTimeout(() => toasts.shift(), 4000)">
    <template x-for="toast in toasts" :key="toast.id">
        <div class="toast-notification pointer-events-auto max-w-sm"
             :class="{
                 'success': toast.type === 'success',
                 'error': toast.type === 'error',
                 'info': toast.type === 'info',
             }">
            <div class="toast-icon" x-show="toast.type === 'success'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="toast-icon" x-show="toast.type === 'error'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div class="toast-icon" x-show="toast.type === 'info'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-sm font-medium text-base-content" x-text="toast.message"></div>
                <button x-show="toast.action"
                        @click="window.dispatchEvent(new CustomEvent(toast.action.event, { detail: toast.action.payload }))"
                        class="text-xs font-semibold text-primary hover:text-primary/80">
                    <span x-text="toast.action?.label"></span>
                </button>
            </div>
        </div>
    </template>
</div>

</body>
</html>
