    <!-- Command Palette (Desktop) -->
    <div x-data="{ open: false, query: '', selectedIndex: 0, commands: [
            { id: 'accounts', label: 'Go to Accounts', shortcut: 'Alt+A', icon: 'card' },
            { id: 'transactions', label: 'Go to Transactions', shortcut: 'Alt+T', icon: 'list' },
            { id: 'insights', label: 'Go to Insights', shortcut: 'Alt+I', icon: 'grid' },
            { id: 'chat', label: 'Go to Chat', shortcut: '/', icon: 'chat' },
            { id: 'settings', label: 'Open Settings', shortcut: 'Alt+S', icon: 'settings' },
            { id: 'new-thread', label: 'New Chat Thread', shortcut: 'Alt+N', icon: 'plus' },
            { id: 'theme', label: 'Toggle Theme', shortcut: 'Alt+D', icon: 'moon' }
         ] }"
         x-init="Alpine.store('commandPalette', { open: false, toggle() { this.open = !this.open } });
                 $watch('$store.commandPalette.open', v => { open = v; if(v) { query = ''; selectedIndex = 0; $nextTick(() => $refs.cmdInput?.focus()); } })"
         x-show="open"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="command-palette-backdrop hidden md:flex"
         @click.self="$store.commandPalette.open = false"
         x-cloak>
        <div class="command-palette animate-scale-in"
             @keydown.down.prevent="selectedIndex = Math.min(selectedIndex + 1, commands.filter(c => c.label.toLowerCase().includes(query.toLowerCase())).length - 1)"
             @keydown.up.prevent="selectedIndex = Math.max(selectedIndex - 1, 0)"
             @keydown.enter.prevent="
                const filtered = commands.filter(c => c.label.toLowerCase().includes(query.toLowerCase()));
                const cmd = filtered[selectedIndex];
                if (cmd) {
                    if (cmd.id === 'theme') $store.theme.toggle();
                    else if (cmd.id === 'new-thread') $store.threads.create();
                    else $store.router.navigate(cmd.id);
                    $store.commandPalette.open = false;
                }
             ">
            <div class="flex items-center gap-3 px-5 py-4 border-b border-base-200/60">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-base-content/40"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" 
                       x-ref="cmdInput"
                       x-model="query"
                       placeholder="Type a command or search..." 
                       class="flex-1 bg-transparent outline-none text-base text-base-content placeholder:text-base-content/40" />
                <kbd class="px-2 py-1 text-xs font-mono bg-base-200 rounded text-base-content/50">ESC</kbd>
            </div>
            <div class="command-palette-list">
                <template x-for="(cmd, index) in commands.filter(c => c.label.toLowerCase().includes(query.toLowerCase()))" :key="cmd.id">
                    <button class="command-palette-item w-full text-left"
                            :class="index === selectedIndex && 'selected'"
                            @click="
                                if (cmd.id === 'theme') $store.theme.toggle();
                                else if (cmd.id === 'new-thread') $store.threads.create();
                                else $store.router.navigate(cmd.id);
                                $store.commandPalette.open = false;
                            "
                            @mouseenter="selectedIndex = index">
                        <div class="command-palette-item-icon">
                            <template x-if="cmd.icon === 'chat'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'card'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'list'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'grid'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'book'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'settings'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'plus'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            </template>
                            <template x-if="cmd.icon === 'moon'">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                            </template>
                        </div>
                        <span class="command-palette-item-label" x-text="cmd.label"></span>
                        <span class="command-palette-item-shortcut" x-text="cmd.shortcut"></span>
                    </button>
                </template>
                <div x-show="commands.filter(c => c.label.toLowerCase().includes(query.toLowerCase())).length === 0" 
                     class="px-5 py-8 text-center text-sm text-base-content/40">
                    No commands found
                </div>
            </div>
            <div class="flex items-center justify-between px-5 py-3 border-t border-base-200/60 text-xs text-base-content/40">
                <div class="flex items-center gap-4">
                    <span class="flex items-center gap-1"><kbd class="px-1.5 py-0.5 bg-base-200 rounded">↑↓</kbd> Navigate</span>
                    <span class="flex items-center gap-1"><kbd class="px-1.5 py-0.5 bg-base-200 rounded">↵</kbd> Select</span>
                </div>
                <span class="flex items-center gap-1"><kbd class="px-1.5 py-0.5 bg-base-200 rounded">⌘K</kbd> to toggle</span>
            </div>
        </div>
    </div>

</div>

<!-- Connection / API Key Modal -->
<div x-data
     x-show="$store.connection.showModal"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/50"
     @click.self="$store.connection.connected && $store.connection.close()"
     x-cloak>
    <div class="card-elevated w-full max-w-md p-6 space-y-5 animate-scale-in bg-base-100">
        <div class="flex items-center gap-3">
            <img src="/static/icons/icon.svg" alt="Gullak" class="w-10 h-10 rounded-xl shadow-sm" />
            <div>
                <h2 class="text-lg font-semibold">Connect to your Gullak server</h2>
                <p class="text-xs text-base-content/50">Enter your API key to load your data.</p>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-base-content/70 mb-2">API Key</label>
                <input type="password"
                       x-model="$store.connection.apiKey"
                       @keydown.enter="$store.connection.save()"
                       placeholder="x-api-key"
                       autocomplete="off"
                       class="input-box w-full" />
            </div>
            <div>
                <label class="block text-sm font-medium text-base-content/70 mb-2">Server URL <span class="text-base-content/40 font-normal">(optional)</span></label>
                <input type="text"
                       x-model="$store.connection.serverUrl"
                       @keydown.enter="$store.connection.save()"
                       placeholder="Leave blank to use this server"
                       autocomplete="off"
                       class="input-box w-full" />
                <p class="text-[10px] text-base-content/40 mt-1">Only set this if your API runs on a different origin.</p>
            </div>

            <div x-show="$store.connection.error" class="text-xs text-error" x-text="$store.connection.error" x-cloak></div>
        </div>

        <div class="flex items-center justify-between gap-2 pt-1">
            <button class="btn btn-ghost btn-sm"
                    x-show="$store.connection.connected"
                    @click="$store.connection.clear()">Disconnect</button>
            <div class="flex-1"></div>
            <button class="btn btn-ghost btn-sm"
                    x-show="$store.connection.connected"
                    @click="$store.connection.close()">Cancel</button>
            <button class="btn btn-primary btn-sm"
                    @click="$store.connection.save()"
                    :disabled="$store.connection.checking">
                <span x-show="!$store.connection.checking">Connect</span>
                <span x-show="$store.connection.checking" class="loading loading-spinner loading-sm"></span>
            </button>
        </div>
    </div>
</div>

<!-- Toast Notifications -->
<div class="fixed bottom-24 md:bottom-6 right-4 md:right-6 left-4 md:left-auto z-50 flex flex-col gap-3 pointer-events-none"
     x-data="{ toasts: [] }"
     @notify.window="toasts.push($event.detail); setTimeout(() => toasts.shift(), 4000)">
    <template x-for="toast in toasts" :key="toast.id">
        <div class="toast-notification pointer-events-auto max-w-sm"
             :class="{
                 'success': toast.type === 'success',
                 'error': toast.type === 'error',
                 'info': toast.type === 'info',
             }">
            <div class="toast-icon" x-show="toast.type === 'success'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="toast-icon" x-show="toast.type === 'error'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <div class="toast-icon" x-show="toast.type === 'info'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            </div>
            <div class="flex items-center gap-3">
                <div class="text-sm font-medium text-base-content" x-text="toast.message"></div>
                <button x-show="toast.action"
                        @click="window.dispatchEvent(new CustomEvent(toast.action.event, { detail: toast.action.payload }))"
                        class="text-xs font-semibold text-primary hover:text-primary/80">
                    <span x-text="toast.action?.label"></span>
                </button>
            </div>
        </div>
    </template>
</div>

</body>
</html>
