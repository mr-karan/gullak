<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0d12" />
    <meta name="description" content="Gullak — local-first expense tracker and money manager." />
    <!-- Vault theme init: set data-theme BEFORE first paint to avoid a flash.
         Reads the persisted choice (raw "dark"/"light"), defaults to dark. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("gullak_theme");
          document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <!-- Figtree carries the whole app — display roles included (weight 800 for
         the net-worth hero). CDN <link>; self-host woff2 later. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Gullak</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
