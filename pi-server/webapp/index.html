<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7faf8" />
    <meta name="description" content="Gullak — local-first expense tracker and money manager." />
    <!-- Resolve the saved choice before first paint. Gullak defaults to the
         calm light ledger; dark mode remains an explicit user choice. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("gullak_theme");
          document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <title>Gullak</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
